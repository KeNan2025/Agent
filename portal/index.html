<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东吴证券 · 上市公司扫雷智能平台</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #0f1724 0%, #1a2740 50%, #0f1724 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .container {
    text-align: center;
    max-width: 900px;
    padding: 40px;
  }
  .brand {
    margin-bottom: 16px;
    font-size: 14px;
    color: rgba(255,255,255,.4);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,.45);
    margin-bottom: 56px;
  }
  .cards {
    display: flex;
    gap: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    width: 360px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    padding: 40px 32px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(.16,1,.3,1);
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    border-radius: 16px 16px 0 0;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,.16);
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
    background: rgba(255,255,255,.06);
  }
  .card--risk::before { background: linear-gradient(90deg, #1a5cff, #4d7fff); }
  .card--twin::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
  .card__icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 26px;
  }
  .card--risk .card__icon { background: rgba(26,92,255,.15); color: #4d7fff; }
  .card--twin .card__icon { background: rgba(124,58,237,.15); color: #a78bfa; }
  .card__title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 10px;
  }
  .card__desc {
    font-size: 14px; color: rgba(255,255,255,.4);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .card__features {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .card__features span {
    font-size: 12px;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.55);
  }
  .badge {
    display: inline-block;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    margin-top: 12px;
  }
  .badge--blue { background: rgba(26,92,255,.15); color: #4d7fff; }
  .badge--purple { background: rgba(124,58,237,.15); color: #a78bfa; }
  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: rgba(255,255,255,.2);
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand">DONGWU SECURITIES</div>
  <h1>上市公司扫雷智能平台</h1>
  <p class="subtitle">基于 Agentic AI 的监管问询概率预测与数字孪生可视化</p>

  <div class="cards">
    <a href="http://localhost:3000" class="card card--risk" target="_blank">
      <div class="card__icon">⚡</div>
      <div class="card__title">扫雷预警系统</div>
      <div class="card__desc">Agentic AI 驱动的上市公司监管问询概率预测、风险归因与可解释报告生成</div>
      <div class="card__features">
        <span>风险排行榜</span><span>批量扫雷</span><span>评估中心</span>
        <span>MCP 工具</span><span>Skill 管理</span><span>报告下载</span>
      </div>
      <span class="badge badge--blue">Port 3000</span>
    </a>

    <a href="http://localhost:3001" class="card card--twin" target="_blank">
      <div class="card__icon">🔮</div>
      <div class="card__title">数字孪生可视化平台</div>
      <div class="card__desc">公司级风险孪生 · 市场热力图谱 · Agent Pipeline 实时运行追踪</div>
      <div class="card__features">
        <span>公司风险孪生</span><span>市场热力图</span><span>Pipeline 追踪</span>
        <span>力导向图谱</span><span>风险雷达</span><span>SHAP 瀑布图</span>
      </div>
      <span class="badge badge--purple">Port 3001</span>
    </a>
  </div>

  <p class="footer">东吴证券 · 第五届中国研究生金融科技创新大赛 · 揭榜挂帅赛题</p>
</div>
</body>
</html>
